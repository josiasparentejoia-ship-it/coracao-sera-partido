<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>IloveDramax - Catálogo de Filmes</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d0015 0%, #1a0525 100%);
            color: #fff;
            min-height: 100vh;
            padding: 0 0 100px;
        }

        /* ── HEADER PRINCIPAL ── */
        .main-header {
            background: linear-gradient(135deg, rgba(147,51,234,0.2), rgba(236,72,153,0.2));
            padding: 30px 20px 25px;
            text-align: center;
            border-bottom: 2px solid rgba(244, 114, 182, 0.3);
            position: relative;
            overflow: hidden;
        }

        .main-header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(244,114,182,0.1) 0%, transparent 70%);
            animation: pulse-bg 4s ease-in-out infinite;
        }

        @keyframes pulse-bg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .logo {
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f472b6, #c084fc, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 14px;
            color: #e9d5ff;
            font-weight: 500;
        }

        /* ── CONTEÚDO ── */
        .content {
            padding: 25px 16px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #f472b6;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            border-radius: 2px;
        }

        /* ── CARROSSEL DE FILMES ── */
        .carousel-container {
            position: relative;
            margin-bottom: 30px;
            border-radius: 20px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(244,114,182,0.15), rgba(192,132,252,0.15));
            border: 2px solid rgba(244, 114, 182, 0.4);
        }

        .carousel-slide {
            display: none;
            position: relative;
            cursor: pointer;
            animation: fadeIn 0.5s ease-in-out;
        }

        .carousel-slide.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .carousel-slide .poster {
            width: 100%;
            height: 400px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.3);
            display: block;
        }

        .carousel-slide:hover .poster {
            opacity: 0.9;
        }

        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 0;
            background: rgba(0, 0, 0, 0.2);
        }

        .carousel-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(244, 114, 182, 0.3);
            transition: all 0.3s;
            cursor: pointer;
        }

        .carousel-indicator.active {
            width: 24px;
            border-radius: 4px;
            background: linear-gradient(135deg, #f472b6, #ec4899);
        }

        /* ── GRID DE FILMES (2 COLUNAS) ── */
        .filmes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .filme-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .filme-card:hover {
            transform: translateY(-4px);
            border-color: rgba(244, 114, 182, 0.5);
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.3);
        }

        .filme-card:active {
            transform: scale(0.97);
        }

        .filme-card .poster {
            width: 100%;
            height: 400px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.3);
            display: block;
        }

        .filme-card .info {
            padding: 14px;
        }

        .filme-card .info h3 {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── PAGINAÇÃO ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
            padding: 20px;
        }

        .pagination button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }

        .pagination button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(236, 72, 153, 0.4);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination .page-info {
            color: #c084fc;
            font-size: 14px;
            font-weight: 600;
        }

        /* ── TELA DE DETALHES DO FILME ── */
        .filme-detalhes {
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .filme-detalhes.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detalhes-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            cursor: pointer;
            color: #f472b6;
            font-weight: 600;
        }

        .detalhes-header:hover {
            color: #ec4899;
        }

        .detalhes-poster {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(236, 72, 153, 0.3);
        }

        .detalhes-titulo {
            font-size: 28px;
            font-weight: 800;
            color: #f472b6;
            margin-bottom: 16px;
        }

        .detalhes-descricao {
            font-size: 16px;
            color: #e9d5ff;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .catalogo-view {
            display: block;
        }

        .catalogo-view.hidden {
            display: none;
        }

        /* ── BOTÃO ── */
        .btn {
            display: block;
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
            margin-top: 14px;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(236, 72, 153, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* ── LOADING ── */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #c084fc;
        }

        .loading::before {
            content: "🎬";
            display: block;
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        .loading p {
            font-size: 16px;
            font-weight: 600;
        }

        /* ── EMPTY ── */
        .empty {
            text-align: center;
            padding: 80px 20px;
            color: #a78bfa;
        }

        .empty::before {
            content: "📭";
            display: block;
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty p {
            font-size: 15px;
            line-height: 1.6;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 20px;
            color: #a78bfa;
            font-size: 13px;
            line-height: 1.6;
        }

        .footer a {
            color: #f472b6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="main-header">
        <div class="logo">
            <span class="logo-icon">🎬</span>
            <h1>IloveDramax</h1>
            <p>Seu catálogo de filmes românticos</p>
        </div>
    </div>

    <div class="content">
        <div id="catalogo-container">
            <div class="loading">
                <p>Carregando catálogo...</p>
            </div>
        </div>
    </div>

    <div class="footer">
        Feito com ❤️ por <a href="https://t.me/DrBuscaOfc">IloveDramax</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Pegar parâmetro do filme em destaque (se houver)
        const urlParams = new URLSearchParams(window.location.search);
        const filmeDestaque = urlParams.get('filme');

        // Carregar catálogo
        fetch('catalogo.json')
            .then(response => response.json())
            .then(data => renderCatalogo(data.filmes))
            .catch(error => {
                console.error('Erro ao carregar catálogo:', error);
                document.getElementById('catalogo-container').innerHTML =
                    '<div class="empty"><p>Erro ao carregar catálogo.<br>Tente novamente mais tarde.</p></div>';
            });

        let currentSlide = 0;
        let carouselInterval = null;
        let todosFilmes = [];
        let paginaAtual = 1;
        const filmesPorPagina = 12; // 2 colunas x 6 linhas

        function renderCatalogo(filmes) {
            const container = document.getElementById('catalogo-container');

            if (!filmes || filmes.length === 0) {
                container.innerHTML = '<div class="empty"><p>Nenhum filme disponível no momento.<br>Volte em breve para novidades!</p></div>';
                return;
            }

            // Salvar todos os filmes
            todosFilmes = [...filmes].sort((a, b) => b.id - a.id);

            let html = '<div class="catalogo-view" id="catalogo-view">';

            // Pegar os 5 filmes mais recentes para o carrossel
            const filmesCarrossel = todosFilmes.slice(0, 5);

            // Renderizar carrossel
            if (filmesCarrossel.length > 0) {
                html += '<div class="carousel-container">';

                filmesCarrossel.forEach((filme, index) => {
                    html += `
                        <div class="carousel-slide ${index === 0 ? 'active' : ''}" onclick="abrirDetalhes('${filme.slug}')">
                            <img class="poster" src="${filme.poster}" alt="${filme.nome}">
                        </div>
                    `;
                });

                // Indicadores do carrossel
                if (filmesCarrossel.length > 1) {
                    html += '<div class="carousel-indicators">';
                    filmesCarrossel.forEach((_, index) => {
                        html += `<div class="carousel-indicator ${index === 0 ? 'active' : ''}" onclick="event.stopPropagation(); goToSlide(${index})"></div>`;
                    });
                    html += '</div>';
                }

                html += '</div>';
            }

            // Renderizar grade de filmes com paginação
            html += '<div class="section-title">Catálogo Completo</div>';
            html += '<div id="filmes-grid-container"></div>';
            html += '</div>';

            // Tela de detalhes (inicialmente oculta)
            html += '<div class="filme-detalhes" id="filme-detalhes"></div>';

            container.innerHTML = html;

            // Renderizar primeira página
            renderPagina(1);

            // Iniciar carrossel
            if (filmesCarrossel.length > 1) {
                setTimeout(() => startCarousel(filmesCarrossel.length), 100);
            }
        }

        function renderPagina(pagina) {
            paginaAtual = pagina;
            const inicio = (pagina - 1) * filmesPorPagina;
            const fim = inicio + filmesPorPagina;
            const filmesPagina = todosFilmes.slice(inicio, fim);
            const totalPaginas = Math.ceil(todosFilmes.length / filmesPorPagina);

            let html = '<div class="filmes-grid">';

            filmesPagina.forEach(filme => {
                html += `
                    <div class="filme-card" onclick="abrirDetalhes('${filme.slug}')">
                        <img class="poster" src="${filme.poster}" alt="${filme.nome}">
                        <div class="info">
                            <h3>${filme.nome}</h3>
                        </div>
                    </div>
                `;
            });

            html += '</div>';

            // Adicionar paginação se houver mais de uma página
            if (totalPaginas > 1) {
                html += '<div class="pagination">';
                html += `<button onclick="renderPagina(${pagina - 1})" ${pagina === 1 ? 'disabled' : ''}>◀ Anterior</button>`;
                html += `<span class="page-info">Página ${pagina} de ${totalPaginas}</span>`;
                html += `<button onclick="renderPagina(${pagina + 1})" ${pagina === totalPaginas ? 'disabled' : ''}>Próxima ▶</button>`;
                html += '</div>';
            }

            document.getElementById('filmes-grid-container').innerHTML = html;
        }

        function abrirDetalhes(slug) {
            const filme = todosFilmes.find(f => f.slug === slug);
            if (!filme) return;

            // Esconder catálogo
            document.getElementById('catalogo-view').classList.add('hidden');

            // Mostrar detalhes
            const detalhesDiv = document.getElementById('filme-detalhes');
            detalhesDiv.innerHTML = `
                <div class="detalhes-header" onclick="voltarCatalogo()">
                    ◀ Voltar ao Catálogo
                </div>
                <img class="detalhes-poster" src="${filme.poster}" alt="${filme.nome}">
                <h2 class="detalhes-titulo">${filme.nome}</h2>
                <p class="detalhes-descricao">${filme.descricao}</p>
                <button class="btn" onclick="assistirFilme('${filme.slug}')">
                    🎬 Assistir Filme Grátis
                </button>
            `;
            detalhesDiv.classList.add('active');

            // Rolar para o topo
            window.scrollTo(0, 0);
        }

        function voltarCatalogo() {
            document.getElementById('catalogo-view').classList.remove('hidden');
            document.getElementById('filme-detalhes').classList.remove('active');
            window.scrollTo(0, 0);
        }

        function startCarousel(totalSlides) {
            if (carouselInterval) {
                clearInterval(carouselInterval);
            }

            // Trocar slide a cada 4 segundos
            carouselInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % totalSlides;
                updateCarousel();
            }, 4000);
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();

            const slides = document.querySelectorAll('.carousel-slide');
            if (carouselInterval) {
                clearInterval(carouselInterval);
            }
            startCarousel(slides.length);
        }

        function updateCarousel() {
            const slides = document.querySelectorAll('.carousel-slide');
            const indicators = document.querySelectorAll('.carousel-indicator');

            slides.forEach((slide, index) => {
                if (index === currentSlide) {
                    slide.classList.add('active');
                } else {
                    slide.classList.remove('active');
                }
            });

            indicators.forEach((indicator, index) => {
                if (index === currentSlide) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
        }

        function assistirFilme(slug) {
            // Enviar slug do filme para o bot
            tg.sendData(slug);
        }
    </script>
</body>
</html>
