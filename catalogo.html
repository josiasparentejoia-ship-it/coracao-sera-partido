<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Catálogo de Filmes</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d0015 0%, #1a0525 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px 16px 100px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(244, 114, 182, 0.2);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #c084fc;
        }

        /* ── FILME PRINCIPAL ── */
        .filme-principal {
            background: linear-gradient(135deg, rgba(244,114,182,0.15), rgba(192,132,252,0.15));
            border: 2px solid rgba(244, 114, 182, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .filme-principal::before {
            content: "⭐ EM DESTAQUE";
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #f472b6, #ec4899);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .filme-principal .poster {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.3);
        }

        .filme-principal h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #f472b6;
        }

        .filme-principal p {
            font-size: 14px;
            color: #e9d5ff;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        /* ── GRID DE FILMES ── */
        .filmes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .filme-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .filme-card:active {
            transform: scale(0.97);
            border-color: rgba(244, 114, 182, 0.5);
        }

        .filme-card .poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .filme-card .info {
            padding: 12px;
        }

        .filme-card .info h3 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .filme-card .info p {
            font-size: 12px;
            color: #c084fc;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── BOTÃO ── */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
            margin-top: 12px;
        }

        .btn:active {
            opacity: 0.85;
            transform: scale(0.98);
        }

        /* ── SEÇÃO ── */
        .secao-titulo {
            font-size: 18px;
            font-weight: 700;
            color: #f472b6;
            margin: 30px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .secao-titulo::before {
            content: "";
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #f472b6, #c084fc);
            border-radius: 2px;
        }

        /* ── LOADING ── */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #c084fc;
        }

        .loading::before {
            content: "🎬";
            display: block;
            font-size: 48px;
            margin-bottom: 16px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* ── EMPTY ── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #a78bfa;
        }

        .empty::before {
            content: "📭";
            display: block;
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Catálogo de Filmes</h1>
        <p>Escolha um filme e assista gratuitamente!</p>
    </div>

    <div id="catalogo-container">
        <div class="loading">Carregando catálogo...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Pegar parâmetro do filme em destaque (se houver)
        const urlParams = new URLSearchParams(window.location.search);
        const filmeDestaque = urlParams.get('filme');

        // Carregar catálogo
        fetch('catalogo.json')
            .then(response => response.json())
            .then(data => renderCatalogo(data.filmes))
            .catch(error => {
                console.error('Erro ao carregar catálogo:', error);
                document.getElementById('catalogo-container').innerHTML =
                    '<div class="empty"><p>Erro ao carregar catálogo.<br>Tente novamente mais tarde.</p></div>';
            });

        function renderCatalogo(filmes) {
            const container = document.getElementById('catalogo-container');

            if (!filmes || filmes.length === 0) {
                container.innerHTML = '<div class="empty"><p>Nenhum filme disponível no momento.</p></div>';
                return;
            }

            let html = '';

            // Se houver filme em destaque via URL, priorizar ele
            let filmePrincipal = null;
            if (filmeDestaque) {
                filmePrincipal = filmes.find(f => f.slug === filmeDestaque);
            }
            // Senão, pegar o marcado como principal
            if (!filmePrincipal) {
                filmePrincipal = filmes.find(f => f.principal);
            }
            // Senão, pegar o primeiro
            if (!filmePrincipal && filmes.length > 0) {
                filmePrincipal = filmes[0];
            }

            // Renderizar filme principal
            if (filmePrincipal) {
                html += `
                    <div class="filme-principal">
                        <img class="poster" src="${filmePrincipal.poster}" alt="${filmePrincipal.nome}">
                        <h2>${filmePrincipal.nome}</h2>
                        <p>${filmePrincipal.descricao}</p>
                        <button class="btn" onclick="assistirFilme('${filmePrincipal.slug}')">
                            🎬 Assistir Agora
                        </button>
                    </div>
                `;
            }

            // Renderizar outros filmes (se houver mais de 1)
            const outrosFilmes = filmes.filter(f => f.slug !== filmePrincipal?.slug);

            if (outrosFilmes.length > 0) {
                html += '<div class="secao-titulo">Outros Filmes Disponíveis</div>';
                html += '<div class="filmes-grid">';

                outrosFilmes.forEach(filme => {
                    html += `
                        <div class="filme-card" onclick="assistirFilme('${filme.slug}')">
                            <img class="poster" src="${filme.poster}" alt="${filme.nome}">
                            <div class="info">
                                <h3>${filme.nome}</h3>
                                <p>${filme.descricao}</p>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
            }

            container.innerHTML = html;
        }

        function assistirFilme(slug) {
            // Enviar slug do filme para o bot
            tg.sendData(slug);
        }
    </script>
</body>
</html>
